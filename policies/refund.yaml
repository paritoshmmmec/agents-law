# A refund requires an observed order and a fresh, observed payment record, and
# the refund amount must be sane. Demonstrates the cross-key `compare` primitive
# and RESTRICT: a refund over the auto-approve ceiling is degraded to a capped
# partial rather than blocked outright, while a refund exceeding the order total
# is a hard BLOCK.
version: "2026-07-05.2"
action: "billing.issue_refund"
rules:
  - id: order_must_exist
    description: "There must be a real, observed order to refund against."
    requirements:
      - key: "order.id"
        must_exist: true
        source_in: [tool_result]
        observed: true
    effect_on_fail: block

  - id: payment_fresh
    description: "Payment record must be observed and recent."
    requirements:
      - key: "order.paid"
        must_exist: true
        equals: true
        source_in: [tool_result]
        observed: true
        max_age: { days: 180 }
    effect_on_fail: block
    effect_on_stale: review

  - id: refund_within_order_total
    description: "A refund can never exceed the order's total. Cross-key compare."
    compare: { left_key: "refund.amount", op: "<=", right_key: "order.total" }
    effect_on_fail: block

  - id: refund_under_auto_ceiling
    description: >
      Refunds at or under the auto-approve ceiling execute in full; anything
      above is degraded to a capped partial (RESTRICT), not blocked.
    compare: { left_key: "refund.amount", op: "<=", right_value: 5000 }
    effect_on_fail: restrict

  - id: no_amount_conflict
    description: "Sources must agree on the refundable amount."
    forbid_conflicts_on: ["order.amount"]
    effect_on_fail: review
